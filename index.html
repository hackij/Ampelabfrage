<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ampelabfrage</title>
    <meta name="theme-color" content="#4b5d67" />
    <meta
      name="description"
      content="Einfache Ampelabfrage für den Unterricht mit großer Farbanzeige auf dem Smartphone."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="intro-card" id="controlPanel">
        <p class="eyebrow">Schnelle Unterrichtsrückmeldung</p>
        <h1>Ampelabfrage</h1>
        <p class="intro-text">
          Wähle die Farbe, die am besten zu deiner aktuellen Situation passt.
        </p>

        <div class="button-grid" aria-label="Ampelfarben">
          <button class="signal-button signal-red" data-signal="red" type="button">
            <span class="signal-dot" aria-hidden="true"></span>
            <span class="signal-copy">
              <strong>Rot</strong>
              <span>Ich brauche Hilfe</span>
            </span>
          </button>

          <button class="signal-button signal-yellow" data-signal="yellow" type="button">
            <span class="signal-dot" aria-hidden="true"></span>
            <span class="signal-copy">
              <strong>Gelb</strong>
              <span>Ich bin unsicher</span>
            </span>
          </button>

          <button class="signal-button signal-green" data-signal="green" type="button">
            <span class="signal-dot" aria-hidden="true"></span>
            <span class="signal-copy">
              <strong>Grün</strong>
              <span>Ich komme gut mit</span>
            </span>
          </button>
        </div>

        <div class="teacher-note">
          <h2>Hinweis</h2>
          <p>
            Nach der Auswahl wird die Farbe direkt gross im Vollbild angezeigt. Ein Tipp auf
            die Farbfläche bringt wieder zurück zur Auswahl.
          </p>
        </div>
      </section>

      <section class="display-panel is-idle" id="displayPanel" aria-live="polite" hidden>
        <div class="display-content">
          <button class="display-surface" id="displaySurface" type="button" aria-label="Zur Auswahl zurückkehren">
            <span class="display-title" id="displayTitle">Ampelabfrage</span>
            <span class="display-hint">Tippen zum Zurückkehren</span>
          </button>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
  </html>
